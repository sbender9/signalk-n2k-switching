# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2

updates:
  # npm dependencies (package.json)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: deps
      prefix-development: deps-dev
      include: scope
    groups:
      # Batch low-risk dev tooling (linting, formatting, types) into one PR
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      # Batch production minor/patch bumps together
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch

  # GitHub Actions used by the workflows in .github/workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      # require_pr_label.yml enforces exactly one of the recognized labels
      - dependencies
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"
